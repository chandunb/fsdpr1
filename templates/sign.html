<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            background-color: black;
        }

        .maincontainer {
            display: flex;
            flex-direction: column;
            min-height: 400px;
            padding: 20px 0;
            box-sizing: border-box;
            width: 90%;
            max-width: 320px;
            border-radius: 20px;
            justify-content: center;
            align-items: center;
            border: 2px solid black;
            box-shadow:  0px 0px 20px rgb(39, 41, 167);
            background-color: black;
            color: white;

        }

        input {
            background-color: black;
            border-color: 2px solid white;
            color: white;
            text-align: center;
            height: 40px;
            width: 90%;
            max-width: 250px;
            box-sizing: border-box;
            border-radius: 20px;
            outline:none;
        }

        #button {
            height: 40px;
            width: 100px;
            background-color: green;
            font-weight: bold;
            border-radius: 20px;
            outline:none;
        }
    </style>
</head>

<body>
    <div class="maincontainer">
        <h2>Sign Up</h2><br><br>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <p class="show" style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('signup') }}" onsubmit="return validatePasswords()" autocomplete="off" style="display: flex; flex-direction: column; align-items: center;">
            <input type="text" placeholder="Enter your name" id="name" name="name" autocomplete="off" required><br><br>
            <input type="password" placeholder="Enter your password" id="pass1" name="password" autocomplete="new-password" required><br><br>
            <input type="password" placeholder="Confirm your password" id="pass2" autocomplete="new-password" required><br>
            <button id="button" name="button" type="submit">sign up</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">sign in</a></p>

    </div>
    <p class="show" style="color: red;"></p>
    <script>
        function validatePasswords() {
            let pass1 = document.querySelector('#pass1');
            let pass2 = document.querySelector('#pass2');
            if (pass1.value === pass2.value) {
                return true;
            } else {
                document.querySelector('.show').innerHTML = 'password is not same';
                return false;
            }
        }
    </script>

</body>

</html>
