<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }

        .container {
            color: white;
            background-color: black;
            padding: 25px 20px 25px 20px;
            box-sizing: border-box;
            justify-content: center;
            border: 2px;
            box-shadow: 0 0 10px rgb(37, 39, 189);
            width: 90%;
            max-width: 300px;
            min-height: 300px;
            border-radius: 20px;
            text-align: center;
            transition: all 2s;
        }

        input {
            border: 2px solid black;
            color: white;
            background-color: black;
            height: 40px;
            width: 90%;
            max-width: 200px;
            box-sizing: border-box;
            font-size: 15px;
            text-align: center;
            border-radius: 25px;
            outline:none;
        }

        #submit {
            border-radius: 5px;
            background-color: rgb(43, 201, 43);
            cursor: pointer;

        }

        h2 {
            animation-name: logincolor;
            animation-duration: 1s;
            animation-iteration-count: infinite;

        }

        @keyframes logincolor {
            from {
                color: pink;
                color: yellow;
            }

            to {
                color: blue;
                color: green;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Login</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <p style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</p>
        {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
            <input type="text" placeholder="Enter your name" name="name" autocomplete="off" required><br><br>
            <input type="password" placeholder="Enter your password" name="password" autocomplete="new-password" required><br><br>
            <input type="submit" value="submit" id="submit"><br>
        </form>
        <p id="new">new user ? <a href="{{ url_for('signup') }}">sign up</a></p>

    </div>
</body>

</html>
